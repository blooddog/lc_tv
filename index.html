<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; }
  #standby {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:20px;
    background:linear-gradient(135deg,#0a0500,#1a0800);
  }
  #logo {
    font-size:64px; font-weight:900; letter-spacing:8px; font-family:sans-serif;
    background:linear-gradient(90deg,#f97316,#fbbf24);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  #sub { font-size:16px; color:rgba(249,115,22,.5); letter-spacing:4px; font-family:sans-serif; }
  #frame { position:absolute; inset:0; width:100%; height:100%; border:none; display:none; }
  #err {
    position:absolute; inset:0; display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:12px;
    background:#0a0500; font-family:sans-serif; text-align:center; padding:40px;
  }
  #err-icon { font-size:48px; }
  #err-msg  { font-size:18px; font-weight:700; color:#f97316; }
  #err-sub  { font-size:13px; color:rgba(249,115,22,.55); max-width:480px; line-height:1.6; }
</style>
</head>
<body>
<div id="standby"><div id="logo">LOSTCITY TV</div><div id="sub">BEREIT</div></div>
<iframe id="frame" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
<div id="err"><div id="err-icon">⚠️</div><div id="err-msg"></div><div id="err-sub"></div></div>

<script>
var frame   = document.getElementById('frame');
var standby = document.getElementById('standby');
var errBox  = document.getElementById('err');

function hide() {
  frame.style.display   = 'none';
  standby.style.display = 'none';
  errBox.style.display  = 'none';
}
function play(src) {
  hide();
  frame.src           = src;
  frame.style.display = 'block';
}
function stop() {
  hide();
  frame.src             = 'about:blank';
  standby.style.display = 'flex';
}
function error(msg, sub) {
  hide();
  document.getElementById('err-msg').textContent = msg;
  document.getElementById('err-sub').textContent = sub || '';
  errBox.style.display = 'flex';
}

function youtube(id) {
  play('https://www.youtube-nocookie.com/embed/' + id
    + '?autoplay=1&mute=0&controls=1&rel=0&modestbranding=1'
    + '&playsinline=1&iv_load_policy=3&enablejsapi=1');
}

function twitch(channel) {
  // parent MUST match the hostname of this page
  var host = window.location.hostname;
  play('https://player.twitch.tv/?channel=' + encodeURIComponent(channel)
    + '&parent=' + host
    + '&autoplay=true&muted=false');
}

// Receive commands from FiveM
window.addEventListener('message', function(e) {
  var d;
  try { d = typeof e.data === 'string' ? JSON.parse(e.data) : e.data; }
  catch(err) { return; }
  if (!d || !d.action) return;

  if      (d.action === 'play_youtube') youtube(d.id);
  else if (d.action === 'play_twitch')  twitch(d.channel);
  else if (d.action === 'stop')         stop();
  else if (d.action === 'volume') {
    try { frame.contentWindow.postMessage(JSON.stringify({event:'command',func:'setVolume',args:[d.value]}),'*'); }
    catch(e){}
  }
  else if (d.action === 'error') error(d.msg, d.sub);
});

// Auto-start from URL hash: index.html#youtube/ID  or  index.html#twitch/CHANNEL
var hash = window.location.hash.slice(1);
if (hash) {
  var parts = hash.split('/');
  if (parts[0] === 'youtube' && parts[1]) youtube(parts[1]);
  else if (parts[0] === 'twitch' && parts[1]) twitch(parts[1]);
}
</script>
</body>
</html>
