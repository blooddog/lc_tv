<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1280px; height:720px; overflow:hidden; background:#000; }
  #standby {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:20px;
    background:linear-gradient(135deg,#0a0500,#1a0800);
  }
  #standby-logo {
    font-size:64px; font-weight:900; letter-spacing:8px; font-family:sans-serif;
    background:linear-gradient(90deg,#f97316,#fbbf24);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  #standby-sub { font-size:16px; color:rgba(249,115,22,.5); letter-spacing:4px; font-family:sans-serif; }
  #loading {
    position:absolute; inset:0; display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:28px;
    background:linear-gradient(135deg,#0a0500,#1a0800); z-index:10;
  }
  #loading-logo {
    font-size:56px; font-weight:900; letter-spacing:8px; font-family:sans-serif;
    background:linear-gradient(90deg,#f97316,#fbbf24);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  #loading-text { font-size:20px; color:#f97316; font-family:sans-serif; letter-spacing:3px; }
  #loading-bar-wrap {
    width:500px; height:8px;
    background:rgba(249,115,22,.15); border-radius:8px;
    border:1px solid rgba(249,115,22,.25); overflow:hidden;
  }
  #loading-bar {
    height:100%; width:0%; border-radius:8px;
    background:linear-gradient(90deg,#f97316,#fbbf24);
    box-shadow:0 0 16px rgba(249,115,22,.8);
    transition:width .15s ease-out;
  }
  #loading-pct { font-size:14px; color:rgba(249,115,22,.6); font-family:sans-serif; letter-spacing:2px; }
  #frame { position:absolute; inset:0; width:1280px; height:720px; border:none; display:none; z-index:5; }
  #err {
    position:absolute; inset:0; display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:14px;
    background:#0a0500; font-family:sans-serif; text-align:center; padding:40px; z-index:10;
  }
  #err-icon { font-size:52px; }
  #err-msg  { font-size:20px; font-weight:700; color:#f97316; }
  #err-sub  { font-size:13px; color:rgba(249,115,22,.55); max-width:500px; line-height:1.6; }
</style>
</head>
<body>

<div id="standby">
  <div id="standby-logo">LOSTCITY TV</div>
  <div id="standby-sub">BEREIT</div>
</div>

<div id="loading">
  <div id="loading-logo">LOSTCITY TV</div>
  <div id="loading-text">Lade Video…</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-pct">0%</div>
</div>

<iframe id="frame" allow="autoplay; encrypted-media; fullscreen" allowfullscreen="true"></iframe>

<div id="err">
  <div id="err-icon">⚠️</div>
  <div id="err-msg"></div>
  <div id="err-sub"></div>
</div>

<script>
var frame   = document.getElementById('frame');
var standby = document.getElementById('standby');
var loading = document.getElementById('loading');
var errBox  = document.getElementById('err');
var bar     = document.getElementById('loading-bar');
var pctEl   = document.getElementById('loading-pct');
var loadTxt = document.getElementById('loading-text');

var loadTimer     = null;
var currentPct    = 0;
var pendingPlay   = null;    // stores {type, id/channel} to play after bar finishes

// ── FIX: Lautstärke speichern ─────────────────────────────────────────────
// Damit Änderungen am Regler während des Ladescreens greifen sobald das Video startet.
var currentVolume = 100;

// ── FIX: Video-Sync (Seek zur richtigen Position) ────────────────────────
// seekTarget  = Sekunden die das Video auf dem Server bereits läuft
// seekStarted = Date.now() beim Empfang des Play-Befehls
// → nach dem Ladebalken wird seekTarget + vergangene Zeit als Zielposition verwendet.
var seekTarget  = 0;
var seekStarted = 0;

function hide() {
  standby.style.display = 'none';
  loading.style.display = 'none';
  errBox.style.display  = 'none';
  frame.style.display   = 'none';
}

function setBar(val) {
  currentPct = Math.min(100, Math.max(0, val));
  bar.style.width   = currentPct + '%';
  pctEl.textContent = Math.round(currentPct) + '%';
}

function startLoading(text) {
  hide();
  loadTxt.textContent   = text || 'Lade Video…';
  loading.style.display = 'flex';
  currentPct = 0;
  setBar(0);
  clearInterval(loadTimer);

  var startTime = Date.now();
  var MIN_MS    = 7000; // 7 seconds minimum

  loadTimer = setInterval(function() {
    var elapsed = Date.now() - startTime;
    var timePct = Math.min(95, (elapsed / MIN_MS) * 95);

    if (currentPct < timePct) {
      setBar(currentPct + (Math.random() * 1.5 + 0.5));
    }

    if (elapsed >= MIN_MS && currentPct >= 90) {
      clearInterval(loadTimer);
      var rush = setInterval(function() {
        if (currentPct < 100) {
          setBar(currentPct + 5);
        } else {
          clearInterval(rush);
          setTimeout(function() {
            hide();
            frame.style.display = 'block';
            if (pendingPlay) {
              triggerPlay(pendingPlay);
              pendingPlay = null;
            }
          }, 400);
        }
      }, 40);
    }
  }, 80);
}

// Wird NACH dem Ladebalken aufgerufen – startet Wiedergabe + Seek + Lautstärke
function triggerPlay(data) {
  if (data.type === 'youtube') {
    // Video starten
    try {
      frame.contentWindow.postMessage(
        JSON.stringify({event:'command', func:'playVideo', args:[]}), '*');
    } catch(e) {}

    // ── FIX: gespeicherte Lautstärke anwenden (nicht hardcoded 100) ──────
    try {
      frame.contentWindow.postMessage(
        JSON.stringify({event:'command', func:'setVolume', args:[currentVolume]}), '*');
    } catch(e) {}

    // ── FIX: Video-Sync — zur richtigen Position springen ────────────────
    // seekTarget = Sekunden vom Server + Setup-Zeit (bereits in Lua eingerechnet)
    // + Zeit die seit Empfang des Play-Befehls vergangen ist (Ladebalken-Dauer)
    var totalSeek = seekTarget + (Date.now() - seekStarted) / 1000;
    if (totalSeek > 2) {
      setTimeout(function() {
        try {
          frame.contentWindow.postMessage(
            JSON.stringify({event:'command', func:'seekTo', args:[Math.floor(totalSeek), true]}), '*');
        } catch(e) {}
      }, 800);
    }
  }
  // Twitch = Livestream → immer aktuell, kein Seek nötig
}

function stop() {
  clearInterval(loadTimer);
  frame.src   = 'about:blank';
  pendingPlay = null;
  seekTarget  = 0;
  seekStarted = 0;
  hide();
  standby.style.display = 'flex';
}

function showError(msg, sub) {
  clearInterval(loadTimer);
  hide();
  document.getElementById('err-msg').textContent = msg;
  document.getElementById('err-sub').textContent = sub || '';
  errBox.style.display = 'flex';
}

// ── FIX: elapsed mitspeichern für Sync ───────────────────────────────────
function playYoutube(id, elapsed) {
  seekTarget  = elapsed || 0;
  seekStarted = Date.now();
  frame.src = 'https://www.youtube-nocookie.com/embed/' + id
    + '?autoplay=0&mute=0&controls=1&rel=0&modestbranding=1'
    + '&playsinline=1&iv_load_policy=3&enablejsapi=1';
  pendingPlay = {type: 'youtube', id: id};
  startLoading('Lade YouTube Video…');
}

function playTwitch(channel) {
  // Twitch = Livestream → kein Seek nötig
  seekTarget  = 0;
  seekStarted = Date.now();
  var host = window.location.hostname;
  frame.src = 'https://player.twitch.tv/?channel=' + encodeURIComponent(channel)
    + '&parent=' + host + '&autoplay=false&muted=true';
  pendingPlay = {type: 'twitch', channel: channel};
  startLoading('Lade Twitch Stream…');
}

// Nach Ladebalken: Twitch mit autoplay=true neu laden + Lautstärke setzen
var origTriggerPlay = triggerPlay;
triggerPlay = function(data) {
  if (data.type === 'twitch') {
    var host = window.location.hostname;
    frame.src = 'https://player.twitch.tv/?channel=' + encodeURIComponent(data.channel)
      + '&parent=' + host + '&autoplay=true&muted=false';
    // ── FIX: Twitch Lautstärke nach dem Laden setzen ─────────────────
    setTimeout(function() {
      try {
        frame.contentWindow.postMessage(
          JSON.stringify({event:'setVolume', value: currentVolume / 100}), '*');
      } catch(e) {}
    }, 2500);
  } else {
    origTriggerPlay(data);
  }
};

// ── FIX: Lautstärke speichern + sofort anwenden ──────────────────────────
function setVolume(val) {
  currentVolume = Math.max(0, Math.min(100, val));
  // YouTube
  try {
    frame.contentWindow.postMessage(
      JSON.stringify({event:'command', func:'setVolume', args:[currentVolume]}), '*');
  } catch(e) {}
  // Twitch
  try {
    frame.contentWindow.postMessage(
      JSON.stringify({event:'setVolume', value: currentVolume / 100}), '*');
  } catch(e) {}
}

window.addEventListener('message', function(e) {
  var d;
  try { d = typeof e.data === 'string' ? JSON.parse(e.data) : e.data; }
  catch(err) { return; }
  if (!d || !d.action) return;

  // elapsed (d.elapsed) wird von Lua mitgeschickt für Video-Sync
  if      (d.action === 'play_youtube') playYoutube(d.id, d.elapsed || 0);
  else if (d.action === 'play_twitch')  playTwitch(d.channel);
  else if (d.action === 'stop')         stop();
  else if (d.action === 'volume')       setVolume(d.value);
  else if (d.action === 'error')        showError(d.msg, d.sub);
  else if (d.action === 'poweroff') {
    clearInterval(loadTimer);
    frame.src = 'about:blank';
    standby.style.display = 'none';
    loading.style.display = 'none';
    errBox.style.display  = 'none';
    frame.style.display   = 'none';
    document.body.style.background = '#000';
  }
  else if (d.action === 'standby') {
    clearInterval(loadTimer);
    frame.src = 'about:blank';
    hide();
    standby.style.display = 'flex';
    document.body.style.background = '#000';
  }
});

var hash = window.location.hash.slice(1);
if (hash) {
  var parts = hash.split('/');
  if      (parts[0] === 'youtube' && parts[1]) playYoutube(parts[1], 0);
  else if (parts[0] === 'twitch'  && parts[1]) playTwitch(parts[1]);
}
</script>
</body>
</html>
